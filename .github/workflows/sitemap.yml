name: Generate Complete Sitemap - netherland-news

on:
  schedule:
    - cron: '0 2 * * *'   # Runs daily at 2:00 AM UTC
  workflow_dispatch:       # Allows manual trigger from Actions tab

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}  # Uses the token you created

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create sitemap generator
        run: |
          cat > generate-sitemap.js << 'EOF'
          // ============================================
          // CONFIGURATION - CHANGE THESE FOR THIS SITE
          // ============================================
          const GIST_ID = '42ea11087f40fdba423f8eb0f575ac96';
          const GIST_OWNER = 'Hamzamain-spec';
          const SITE_ID = 'netherland-news';        // <-- CHANGE THIS
          const BASE_URL = 'http://netherland-news.qs0.de'; // <-- CHANGE THIS
          // ============================================

          async function generateSitemap() {
            try {
              console.log(`📡 Fetching posts for site: ${SITE_ID}...`);
              const response = await fetch(`https://gist.githubusercontent.com/${GIST_OWNER}/${GIST_ID}/raw/posts.json`);

              if (!response.ok) {
                throw new Error(`Failed to fetch Gist: ${response.status}`);
              }

              const allPosts = await response.json();
              console.log(`📊 Total posts in Gist: ${allPosts.length}`);

              // Filter for this specific site
              const sitePosts = allPosts.filter(p => p && p.site === SITE_ID);
              console.log(`📝 Found ${sitePosts.length} articles for ${SITE_ID}`);

              const today = new Date().toISOString().split('T')[0];
              let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
              xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';

              // Static pages
              xml += `  <url>\n    <loc>${BASE_URL}/</loc>\n    <lastmod>${today}</lastmod>\n    <changefreq>daily</changefreq>\n    <priority>1.0</priority>\n  </url>\n`;
              xml += `  <url>\n    <loc>${BASE_URL}/index.html</loc>\n    <lastmod>${today}</lastmod>\n    <changefreq>daily</changefreq>\n    <priority>1.0</priority>\n  </url>\n`;

              // Article pages (post.html?id=xxx)
              sitePosts.forEach(post => {
                const postDate = post.date ? new Date(post.date).toISOString().split('T')[0] : today;
                xml += `  <url>\n    <loc>${BASE_URL}/post.html?id=${post.id}</loc>\n    <lastmod>${postDate}</lastmod>\n    <changefreq>weekly</changefreq>\n    <priority>0.8</priority>\n  </url>\n`;
              });

              xml += '</urlset>';

              // Save to file
              const fs = require('fs');
              fs.writeFileSync('sitemap.xml', xml);
              console.log(`✅ Sitemap generated successfully with ${sitePosts.length} articles`);

            } catch (error) {
              console.error('❌ Error generating sitemap:', error.message);
              process.exit(1);
            }
          }

          generateSitemap();
          EOF

      - name: Run sitemap generator
        run: node generate-sitemap.js

      - name: Commit and push sitemap
        run: |
          git config --global user.name 'Hamzamain-spec'
          git config --global user.email 'hamzaauthority1@gmail.com'
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to sitemap.xml"
          else
            git commit -m "🔄 Update sitemap [automated] for netherland-news"
            git push https://x-access-token:${{ secrets.PAT }}@github.com/Hamzamain-spec/netherland-news.git HEAD:main
            echo "✅ Sitemap committed and pushed"
          fi
